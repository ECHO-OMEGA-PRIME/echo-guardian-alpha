name = "echo-guardian-alpha"
main = "src/index.ts"
compatibility_date = "2024-12-01"
[vars]
GUARDIAN_ID = "alpha"
PARTNER_URL = "https://echo-guardian-beta.bmcii1976.workers.dev"
PARTNER_NAME = "echo-guardian-beta"
CLOUDFLARE_ACCOUNT_ID = "b9af3a4bf161132bb7e5d3d365fb8bb0"
GITHUB_ORG = "ECHO-OMEGA-PRIME"

[[d1_databases]]
binding = "DB"
database_name = "echo-guardian-alpha"
database_id = "ea7afd5e-3205-4026-b370-c30688431819"

[[kv_namespaces]]
binding = "CACHE"
id = "5384f19726f94f95ba14e9ebc890148a"

[triggers]
crons = ["*/5 * * * *", "*/30 * * * *", "0 */6 * * *", "0 8 * * *"]

[[services]]
binding = "SVC_SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "SVC_ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SVC_BUILDER"
service = "echo-autonomous-builder"

[[services]]
binding = "SVC_DAEMON"
service = "echo-autonomous-daemon"

[[services]]
binding = "SVC_PARTNER"
service = "echo-guardian-beta"
